<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Library Digital - Portal Rental Buku & Komik</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Space+Grotesk:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["'Plus Jakarta Sans'", "ui-sans-serif", "system-ui", "sans-serif"],
            display: ["'Space Grotesk'", "sans-serif"],
            mono: ["'JetBrains Mono'", "monospace"],
          },
          colors: {
            'neo-teal': '#60A5FA',
            'neo-magenta': '#FF6AC1',
            'neo-yellow': '#FFE500',
            'neo-orange': '#ff5003',
            'neo-green': '#4ADE80',
            'neo-beige': '#ffffff',
            'neo-paper': '#F3F4F6',
          }
        }
      }
    }
  </script>
  
  <!-- Custom Neo Styles -->
  <link rel="stylesheet" href="assets/css/style.css">
  
  <!-- Vue 3, Vue Router & Axios CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-neo-paper select-text font-sans">
  <div id="app">
    <!-- Navbar Navigation -->
    <nav class="border-b-4 border-black bg-white sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3.5 flex items-center justify-between">
        <div class="flex items-center gap-2.5 cursor-pointer select-none group" @click="goHome">
          <div class="bg-neo-magenta p-2 neo-border-thin shadow-[2px_2px_0px_#000] group-hover:-translate-y-0.5 group-hover:bg-neo-yellow transition-all">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
          </div>
          <div>
            <span class="font-display font-black text-lg md:text-xl tracking-tighter text-black uppercase block leading-none">
              E-LIBRARY
            </span>
            <span class="font-mono text-[9px] uppercase font-bold text-zinc-500 tracking-wider">
              Digital Book Circulations
            </span>
          </div>
        </div>

        <!-- Navigation Links -->
        <div class="flex items-center gap-3">
          <router-link to="/" class="font-display font-bold text-xs md:text-sm px-4 py-2 transition-all cursor-pointer rounded-none text-black border border-transparent" active-class="bg-neo-yellow neo-border shadow-[2px_2px_0px_#000]">
            Katalog Publik
          </router-link>

          <router-link to="/admin" class="font-display font-bold text-xs md:text-sm px-4 py-2 transition-all cursor-pointer rounded-none text-black border border-transparent" active-class="bg-neo-teal neo-border shadow-[2px_2px_0px_#000]">
            Dashboard Admin
          </router-link>

          <!-- Dynamic Session Control -->
          <div v-if="isAdmin" class="hidden sm:flex items-center gap-2 bg-black text-white py-1 pl-2.5 pr-1.5 neo-border border-white shadow-[2px_2px_0px_#000] rotate-[1deg]">
            <svg class="w-3.5 h-3.5 text-neo-teal" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            <span class="font-mono text-[10px] font-black uppercase text-white tracking-widest">{{ adminUsername }}</span>
            <button @click="logout" class="bg-neo-orange border border-black hover:bg-[#ff692a] text-white py-0.5 px-2 font-display text-[9px] font-bold tracking-tight uppercase cursor-pointer transition-colors">
              Logout
            </button>
          </div>
          <button v-else @click="openLogin" class="hidden sm:inline-flex items-center justify-center font-display font-bold text-xs md:text-sm px-4 py-2 bg-neo-magenta hover:bg-[#ff33ff] text-white neo-border shadow-[2px_2px_0px_#000] cursor-pointer select-none rounded-none transition-all">
            Admin Login
          </button>
        </div>
      </div>
    </nav>

    <!-- Main Dynamic Component Layout -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8 pb-16">
      <router-view v-slot="{ Component }">
        <transition name="fade" mode="out-in">
          <component :is="Component" />
        </transition>
      </router-view>
    </main>

    <!-- Toast Notifications System -->
    <div class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 max-w-[90vw] md:max-w-md pointer-events-none">
      <div v-for="toast in toasts" :key="toast.id" 
           :class="getToastBg(toast.type) + ' ' + getToastText(toast.type)"
           class="pointer-events-auto flex items-center justify-between p-3.5 neo-border shadow-[3px_3px_0px_#000000] rounded-none animate-slide-in">
        <div class="flex items-center font-display font-bold text-xs md:text-sm">
          <!-- Toast Icons -->
          <svg v-if="toast.type === 'success'" class="w-4 h-4 mr-2 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <svg v-else-if="toast.type === 'warn'" class="w-4 h-4 mr-2 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
          </svg>
          <svg v-else-if="toast.type === 'error'" class="w-4 h-4 mr-2 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <svg v-else class="w-4 h-4 mr-2 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <span>{{ toast.message }}</span>
        </div>
        <button @click="removeToast(toast.id)" class="ml-4 cursor-pointer focus:outline-none p-0.5 border border-transparent hover:border-black">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- App script entry module -->
  <script type="module" src="app.js"></script>
</body>
</html>
